<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon32.png" type="image/png">
  <title data-i18n="title">Voting</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
  <style>
    .bg-noshown {
      background-color: #6f42c1; /* morado Bootstrap */
      color: white;
    }

    .btn-comments {
      background-color: #f97316;
      border-color: #f97316;
      color: #fff;
    }

    .btn-comments:hover {
      background-color: #ea580c;
      border-color: #ea580c;
      color: #fff;
    }

    .btn-outline-comments {
      color: #f97316;
      border-color: #f97316;
    }

    .btn-outline-comments:hover {
      background-color: #f97316;
      border-color: #f97316;
      color: #fff;
    }

    #dancersTableContainer.dancers-table-collapsed {
      max-width: 700px;
    }

    #dancersTableContainer.dancers-table-expanded {
      max-width: 100%;
    }

    .criteria-col {
      width: 70px;
      min-width: 70px;
      max-width: 70px;
      white-space: nowrap;
    }

    .criteria-header-text {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .competition-option-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .badge-neutral-dark {
      background-color: #495057;
      color: #fff;
    }

    .competition-option-meta {
      font-size: 0.82rem;
      color: #6c757d;
    }

    .competition-option-meta i {
      margin-right: 0.2rem;
    }

    .ts-dropdown .option .competition-option-wrap {
      padding: 0.2rem 0;
    }

    .competition-info-row {
      display: flex;
      align-items: center;
      column-gap: 1.25rem;
      row-gap: 0.85rem;
      flex-wrap: wrap;
    }

    .competition-info-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0;
    }

    .competition-info-time {
      font-size: 0.92rem;
      color: #495057;
      margin-bottom: 0;
      white-space: nowrap;
    }

    .competition-info-progress {
      flex: 1 1 260px;
      min-width: 220px;
    }

    #penaltyAssignmentModal .modal-dialog {
      width: 96vw;
      max-width: 980px;
    }

    #penaltyAssignmentModal .modal-body {
      max-height: 72vh;
      overflow-y: auto;
    }

    #penaltyAssignmentModal .penalty-assignment-header {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    #penaltyAssignmentModal .penalty-assignment-participant {
      font-size: 1.3rem;
      line-height: 1.2;
    }

    #penaltyAssignmentModal .penalty-assignment-competition-badge {
      width: fit-content;
      max-width: 100%;
      text-align: left;
      white-space: normal;
    }

    #penaltyAssignmentModal .penalty-assignment-table {
      table-layout: fixed;
      min-width: 860px;
    }

    #penaltyAssignmentModal .penalty-col-apply {
      width: 72px;
    }

    #penaltyAssignmentModal .penalty-col-name {
      width: auto;
    }

    #penaltyAssignmentModal .penalty-col-assigned-by {
      width: 130px;
    }

    #penaltyAssignmentModal .penalty-col-for-judges {
      width: 100px;
    }

    #penaltyAssignmentModal .penalty-col-range {
      width: 110px;
    }

    #penaltyAssignmentModal .penalty-col-score {
      width: 120px;
    }

    #penaltyAssignmentModal .penalty-fixed-badge {
      font-size: 0.68rem;
      line-height: 1;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="header"></div>
  <div class="container py-4">
      
    <div class="container" id="voteContainer">
      <div class="row g-3 align-items-start mb-4 justify-content-center">
        <div class="col-md-6">
          <select class="form-select" id="competitionSelect" disabled>
            <option selected disabled value="" data-i18n="select_competition">Select a competition</option>
          </select>
          <div class="row g-2 mt-2">
            <div class="col-12 col-md-6">
              <button class="btn btn-outline-primary w-100 text-start d-flex flex-column justify-content-center" id="previousCompetitionBtn" disabled>
                <span class="competition-nav-label">Previous Competition</span>
                <span class="competition-nav-meta small opacity-75 d-none"></span>
              </button>
            </div>
            <div class="col-12 col-md-6">
              <button class="btn btn-outline-primary w-100 text-start d-flex flex-column justify-content-center" id="nextCompetitionBtn" disabled>
                <span class="competition-nav-label">Next Competition</span>
                <span class="competition-nav-meta small opacity-75 d-none"></span>
              </button>
            </div>
          </div>
        </div>
        
        <div class="col-md-1">
          <button class="btn btn-primary" id="refreshBtn" data-i18n="refresh" disabled>Refresh</button>
        </div>
      </div>

      <div class="card mb-4" id="competitionInfo" style="display:none;">
        <div class="card-body">
          <div class="competition-info-row">
            <div class="competition-info-badges">
              <span id="compCategory" class="badge bg-secondary fs-6 px-2 py-1">-</span>
              <span id="compStyle" class="badge bg-secondary fs-6 px-2 py-1">-</span>
              <span id="compStatus" class="badge bg-secondary fs-6 px-2 py-1">-</span>
            </div>
            <div id="compTime" class="competition-info-time"></div>
            <div class="progress position-relative competition-info-progress" role="progressbar" aria-label="Competition progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" style="height: 30px;">
              <div id="compProgressBar" class="progress-bar progress-bar-striped bg-warning" style="width: 0%"></div>
              <span id="compProgressText" class="position-absolute top-50 start-50 translate-middle fw-bold fs-6 text-nowrap text-dark">0/0 (0%)</span>
            </div>
          </div>
        </div>
      </div>

      <div class="alert alert-info text-center" id="judgeReserveInfo" style="display:none;" data-i18n="reserve_alert">
        <i class="bi bi-info-circle-fill me-2"></i>
        You are a reserve judge. You can only vote for dancers who have a judge as their coach.
      </div>

      <!-- Tabla de bailarinas -->
      <div class="table-responsive mx-auto dancers-table-collapsed" id="dancersTableContainer" style="display:none;">
        <div class="d-flex justify-content-center mb-2">
          <button type="button" class="btn btn-sm btn-outline-secondary opacity-75" id="toggleCriteriaBtn">
            <i class="bi bi-layout-three-columns me-1"></i>
            <span id="toggleCriteriaBtnText">Show scores</span>
          </button>
        </div>
        <table class="table table-bordered align-middle text-center">
          <thead class="table-light">
            <tr id="dancersTableHeadRow"></tr>
          </thead>
          <tbody id="dancersTableBody">
            <!-- Bailarinas se cargarán aquí dinámicamente -->
          </tbody>
        </table>
      </div>

      <div class="modal fade" id="detailsModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title" id="detailsModalLabel">Votes</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="row g-3 text-center" id="criteriaContainer"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="commentsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-body">
              <label for="commentsTextarea" class="form-label fw-semibold" data-i18n="comments">Comments</label>
              <textarea id="commentsTextarea" class="form-control" rows="5" placeholder="Add comments..." data-i18n-placeholder="add_comments"></textarea>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-danger" id="clearCommentsBtn" data-i18n="clear">Clear</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="close">Close</button>
              <button type="button" class="btn btn-primary" id="saveCommentsBtn" data-i18n="save">Save</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="penaltyAssignmentModal" tabindex="-1" aria-labelledby="penaltyAssignmentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title" id="penaltyAssignmentModalLabel" data-i18n="penalty_modal_title">Penalties</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="penaltyAssignmentModalBody">
              <div class="d-flex align-items-center justify-content-center py-4">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                <span data-i18n="loading">Loading...</span>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-primary btn-sm" id="penaltyAssignmentSaveBtn" data-i18n="penalty_modal_save">Save</button>
              <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="close">Close</button>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>
  
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/voting.js"></script>
</body>
</html>
