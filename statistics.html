<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon32.png" type="image/png">
  <title data-i18n="title">Statistics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .schedule-instagram-section {
      max-width: 46rem;
      margin: 0 auto 1rem;
    }

    .schedule-instagram-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.78rem 1rem;
      border-radius: 1.1rem;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(135deg, rgba(131, 58, 180, 0.09), rgba(253, 29, 29, 0.04) 45%, rgba(252, 176, 69, 0.1));
      border: 1px solid rgba(131, 58, 180, 0.12);
      box-shadow: 0 0.8rem 1.8rem rgba(15, 23, 42, 0.04);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .schedule-instagram-card:hover,
    .schedule-instagram-card:focus {
      color: inherit;
      transform: translateY(-1px);
      border-color: rgba(131, 58, 180, 0.18);
      box-shadow: 0 1rem 2.1rem rgba(15, 23, 42, 0.08);
    }

    .schedule-instagram-main {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.85rem;
    }

    .schedule-instagram-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.35rem;
      height: 2.35rem;
      border-radius: 0.8rem;
      background: linear-gradient(135deg, #f58529, #dd2a7b 58%, #8134af);
      color: #ffffff;
      font-size: 1.08rem;
      flex-shrink: 0;
      box-shadow: 0 0.7rem 1.5rem rgba(221, 42, 123, 0.18);
    }

    .schedule-instagram-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.35rem 0.6rem;
      min-width: 0;
    }

    .schedule-instagram-title {
      color: #6f214d;
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
    }

    .schedule-instagram-handle {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(129, 52, 175, 0.1);
      background: rgba(255, 255, 255, 0.72);
      color: #7e2b60;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .schedule-instagram-arrow {
      position: absolute;
      top: 50%;
      right: 1rem;
      color: #a33d73;
      font-size: 1.05rem;
      flex-shrink: 0;
      transform: translateY(-50%);
      transition: transform 0.18s ease;
    }

    .schedule-instagram-card:hover .schedule-instagram-arrow,
    .schedule-instagram-card:focus .schedule-instagram-arrow {
      transform: translate(2px, calc(-50% - 2px));
    }

    @media (max-width: 576px) {
      .schedule-instagram-main {
        gap: 0.75rem;
      }

      .schedule-instagram-card {
        padding: 0.72rem 0.9rem;
      }

      .schedule-instagram-title {
        font-size: 0.88rem;
      }

      .schedule-instagram-handle {
        font-size: 0.78rem;
      }
    }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="header"></div>

  <div class="container-fluid py-4">

    <div class="schedule-instagram-section">
      <a class="schedule-instagram-card" href="https://www.instagram.com/lumoraevents.app/" target="_blank" rel="noopener noreferrer" aria-label="Instagram lumoraevents.app">
        <span class="schedule-instagram-main">
          <span class="schedule-instagram-icon" aria-hidden="true">
            <i class="bi bi-instagram"></i>
          </span>
          <span class="schedule-instagram-copy">
            <span class="schedule-instagram-title" data-i18n="instagram_follow_message">Síguenos para no perderte nada</span>
            <span class="schedule-instagram-handle">@lumoraevents.app</span>
          </span>
        </span>
        <span class="schedule-instagram-arrow" aria-hidden="true">
          <i class="bi bi-arrow-up-right"></i>
        </span>
      </a>
    </div>
  
    <div class="row justify-content-center mb-3">
      <div class="col-auto">
  
        <form id="statsForm">
          <div class="row g-2 justify-content-center align-items-center">
            <div class="col-12 col-sm-auto">
              <input type="text" class="form-control text-center" id="dancerCode" placeholder="Enter dancer code"
                maxlength="15" style="width: 300px;" data-i18n-placeholder="enter_dancer_code">
            </div>
            <div class="col-12 col-sm-auto d-grid">
              <button type="submit" class="btn btn-primary" id="getStatsBtn">
                <i class="bi bi-graph-up-arrow me-1"></i>
                <span data-i18n="get_stats">Get Stats</span>
              </button>
            </div>
          </div>
        </form>
  
      </div>
    </div>
  
    <div id="statsAlert" class="text-center my-2"></div>
  
    <div id="statisticsContainer" class="row g-3 justify-content-center"></div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/statistics.js"></script>

</body>
</html>
