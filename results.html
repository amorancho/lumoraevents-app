<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon32.png" type="image/png">
  <title data-i18n="title">Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .schedule-instagram-section {
      max-width: 46rem;
      margin: 0 auto 1rem;
    }

    .schedule-instagram-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.68rem 0.95rem;
      border-radius: 1.1rem;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(135deg, rgba(131, 58, 180, 0.09), rgba(253, 29, 29, 0.04) 45%, rgba(252, 176, 69, 0.1));
      border: 1px solid rgba(131, 58, 180, 0.12);
      box-shadow: 0 0.8rem 1.8rem rgba(15, 23, 42, 0.04);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .schedule-instagram-card:hover,
    .schedule-instagram-card:focus {
      color: inherit;
      transform: translateY(-1px);
      border-color: rgba(131, 58, 180, 0.18);
      box-shadow: 0 1rem 2.1rem rgba(15, 23, 42, 0.08);
    }

    .schedule-instagram-main {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.7rem;
      transform: translateX(-0.18rem);
    }

    .schedule-instagram-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.05rem;
      height: 2.05rem;
      border-radius: 0.72rem;
      background: linear-gradient(135deg, #f58529, #dd2a7b 58%, #8134af);
      color: #ffffff;
      font-size: 0.95rem;
      flex-shrink: 0;
      box-shadow: 0 0.7rem 1.5rem rgba(221, 42, 123, 0.18);
    }

    .schedule-instagram-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.3rem 0.5rem;
      min-width: 0;
    }

    .schedule-instagram-title {
      color: #6f214d;
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
    }

    .schedule-instagram-handle {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0.2rem 0.52rem;
      border-radius: 999px;
      border: 1px solid rgba(129, 52, 175, 0.1);
      background: rgba(255, 255, 255, 0.72);
      color: #7e2b60;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .schedule-instagram-arrow {
      position: absolute;
      top: 50%;
      right: 0.72rem;
      color: #a33d73;
      font-size: 1.05rem;
      flex-shrink: 0;
      transform: translateY(-50%);
      transition: transform 0.18s ease;
    }

    .schedule-instagram-card:hover .schedule-instagram-arrow,
    .schedule-instagram-card:focus .schedule-instagram-arrow {
      transform: translate(2px, calc(-50% - 2px));
    }

    @media (max-width: 576px) {
      .schedule-instagram-main {
        flex-wrap: nowrap;
        gap: 0.55rem;
        transform: translateX(-0.24rem);
      }

      .schedule-instagram-card {
        padding: 0.62rem 0.74rem;
      }

      .schedule-instagram-icon {
        width: 1.85rem;
        height: 1.85rem;
        font-size: 0.86rem;
      }

      .schedule-instagram-copy {
        flex-wrap: nowrap;
        gap: 0.24rem 0.36rem;
      }

      .schedule-instagram-title {
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .schedule-instagram-handle {
        padding: 0.18rem 0.45rem;
        font-size: 0.7rem;
        white-space: nowrap;
      }
    }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="header"></div>

  <div class="container-fluid py-4">

    <div class="schedule-instagram-section">
      <a class="schedule-instagram-card" href="https://www.instagram.com/lumoraevents.app/" target="_blank" rel="noopener noreferrer" aria-label="Instagram lumoraevents.app">
        <span class="schedule-instagram-main">
          <span class="schedule-instagram-icon" aria-hidden="true">
            <i class="bi bi-instagram"></i>
          </span>
          <span class="schedule-instagram-copy">
            <span class="schedule-instagram-title" data-i18n="instagram_follow_message">Síguenos para no perderte nada</span>
            <span class="schedule-instagram-handle">@lumoraevents.app</span>
          </span>
        </span>
        <span class="schedule-instagram-arrow" aria-hidden="true">
          <i class="bi bi-arrow-up-right"></i>
        </span>
      </a>
    </div>

    <div id="noticePanel" class="mb-4" style="display: none;">
      <div class="alert d-flex flex-column text-center alert-dismissible fade show" role="alert" id="notice_type">
        <div id="notice_text">

        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>

    <div class="row g-3 justify-content-center mb-2">
      <!-- Desplegable + botón (centrado) -->
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        
        <div class="input-group">
          <select class="form-select" id="categorySelect">
            <!-- opciones -->
          </select>
          <select class="form-select d-none" id="styleSelect">
            <!-- opciones -->
          </select>
          <button id="refreshBtn" class="btn btn-primary" data-i18n="refresh" disabled >
            Refresh
          </button>
        </div>

      </div>
    </div>

    <div class="row">
      <div class="col text-center small text-muted" id="infoText" data-i18n="info_click_dancer">
        Click on each dancer to see their voting details.
      </div>
    </div>

    <!-- Categoría (badge más pequeño y con menos margen) -->
    <div class="row">
      <div class="col text-center my-2">
        <h4 id="categoriaTitulo">
          <span id="categoriaBadge" class="badge bg-primary text-white fs-5 px-3 py-2 d-none">
            <!-- Texto dinámico -->
          </span>
        </h4>
      </div>
    </div>

    
    <div id="resultsContainer"></div>
  </div>

  <!-- Modal de visualización de detalles de puntuaciones de las votaciones -->
  <div class="modal fade" id="votingDetailsModal" tabindex="-1" aria-labelledby="votingDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <span class="fw-bold text-primary" id="votingDetailsModalLabel" data-i18n="voting_details">Voting Details</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div id="votingDetailsContainer"></div>
          
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cerrar">Close</button>
          <!--button type="button" class="btn btn-primary" id="saveEditBtn">Save changes</button-->
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="styleVotingDetailsModal" tabindex="-1" aria-labelledby="styleVotingDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <span class="fw-bold text-primary" id="styleVotingDetailsModalLabel" data-i18n="style_voting_details">Style Voting Details</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div id="styleVotingDetailsContainer"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cerrar">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/results.js"></script>

</body>
</html>
