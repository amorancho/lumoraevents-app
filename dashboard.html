<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon32.png" type="image/png">
  <title data-i18n="title">Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="header"></div>

  <div class="container-fluid py-4">
    <div id="organizationSidebarToggle" class="d-lg-none mb-3"></div>

    <div class="row g-4 align-items-start">
      <aside class="col-lg-3 col-xl-2 d-none d-lg-block">
        <div id="organizationSidebarMount"></div>
      </aside>

      <main class="col-12 col-lg-9 col-xl-10">
        <div class="d-flex flex-column gap-4">
          <section class="row g-3">
            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_badge">Organization Dashboard</div>
                  <div class="fw-semibold" id="dashboardEventName">-</div>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_event_code_label">Event Code</div>
                  <div class="fw-semibold" id="dashboardEventCode">-</div>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_card_status">Event Status</div>
                  <span class="badge rounded-pill text-bg-secondary" id="dashboardStatusValue">-</span>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_card_dates">Dates</div>
                  <div class="fw-semibold" id="dashboardDateValue">-</div>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_card_language">Language</div>
                  <div class="fw-semibold" id="dashboardLanguageValue">-</div>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <div class="small text-uppercase text-body-secondary fw-semibold mb-2" data-i18n="dashboard_card_visibility">Visibility</div>
                  <span class="badge rounded-pill text-bg-secondary" id="dashboardVisibilityValue">-</span>
                </div>
              </div>
            </div>
          </section>

          <section class="row g-3">
            <div class="col-12 col-xl-7">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-body-tertiary fw-semibold" data-i18n="dashboard_main_panel_title">Main Panel</div>
                <div class="card-body">
                  <p class="text-body-secondary mb-0" data-i18n="dashboard_main_panel_text">
                    This central area is ready for the next dashboard widgets, KPIs, and summaries.
                  </p>
                </div>
              </div>
            </div>

            <div class="col-12 col-xl-5">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-body-tertiary fw-semibold" data-i18n="dashboard_secondary_panel_title">Quick Notes</div>
                <div class="card-body">
                  <p class="text-body-secondary mb-0" data-i18n="dashboard_secondary_panel_text">
                    Use the sidebar to move between the event setup, participants, competitions, and tracking tools.
                  </p>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
