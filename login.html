<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>LumoraEvents Login</title>  
  <title>Login - LumoraEvents</title>
  <link rel="icon" href="favicon32.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Raleway', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .login-container img {
      width: 280px;
      margin-bottom: 20px;
    }

    .login-container h2 {
      margin-bottom: 30px;
      font-weight: 600;
      font-size: 1.6rem;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #ffcc70;
      color: #2c2c2c;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .login-btn:hover {
      background: #fcb045;
    }

    .footer-text {
      margin-top: 20px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .legal-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .legal-links a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 600;
    }

    .legal-links a:hover {
      text-decoration: underline;
    }

    #legalAcceptModal .modal-body {
      color: #212529;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="https://res.cloudinary.com/ddgxtuwdo/image/upload/v1781521973/copy_of_new_logo_lumoraevents_small_kwnjrc.png" alt="LumoraEvents Logo">
    <h2 data-i18n="login_title">User Login</h2>
    <form>
      <div class="form-group">
        <label for="username" data-i18n="username_label">Username</label>
        <input type="text" id="username" placeholder="">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="password_label">Password</label>
        <input type="password" id="password" placeholder="">
      </div>
      <button type="submit" class="login-btn" data-i18n="login_button">Login</button>
    </form>
    <div class="footer-text" id="regName">(c) 2025 LumoraEvents</div>
  </div>
  
  <div class="modal fade" id="legalAcceptModal" tabindex="-1" aria-labelledby="legalAcceptModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="legalAcceptModalLabel" data-i18n="legal_accept_title">Legal Acceptance Required</h5>
        </div>
        <div class="modal-body">
          <p class="mb-2" data-i18n="legal_accept_description">Review and accept the required legal documents to continue.</p>
          <div id="legalAcceptLinks" class="legal-links"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="legalAcceptConfirmBtn" data-i18n="legal_accept_button">Accept</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
