<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon32.png" type="image/png">
  <title data-i18n="title">Audience voting</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .public-vote-shell { max-width: 64rem; }
    .public-vote-panel { border: 0; border-radius: 1.35rem; box-shadow: 0 .85rem 2.4rem rgba(15, 23, 42, .09); }
    .public-vote-event-logo { width: 88px; height: 88px; object-fit: contain; border-radius: 1rem; background: #fff; }
    .public-vote-countdown { font-size: clamp(3rem, 14vw, 6rem); font-variant-numeric: tabular-nums; letter-spacing: .04em; }
    .public-candidate-card { display: block; min-height: 7rem; border: 2px solid var(--bs-border-color); border-radius: 1.15rem; cursor: pointer; transition: border-color .16s ease, background .16s ease, transform .16s ease, box-shadow .16s ease; }
    .public-candidate-card:hover { transform: translateY(-2px); box-shadow: 0 .65rem 1.4rem rgba(15, 23, 42, .08); }
    .public-candidate-card:has(input:checked) { border-color: var(--bs-primary); background: rgba(var(--bs-primary-rgb), .07); box-shadow: 0 0 0 .18rem rgba(var(--bs-primary-rgb), .13); }
    .public-candidate-card:has(input:focus-visible) { outline: 3px solid rgba(var(--bs-primary-rgb), .4); outline-offset: 3px; }
    .public-candidate-card:has(input:disabled) { cursor: default; opacity: .72; transform: none; }
    .public-result-position { width: 3.25rem; height: 3.25rem; flex: 0 0 3.25rem; }
    .public-vote-min-width-0 { min-width: 0; }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="b4163310-ede9-4a5d-8386-8fe6df71a9fb" data-utcoffset="2"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
  <div id="header"></div>

  <main class="container public-vote-shell py-4 py-md-5 flex-grow-1">
    <div class="mb-3 d-none" id="backToPublicVotesContainer">
      <a class="btn btn-outline-secondary" href="public-votes.html" id="backToPublicVotesBtn">
        <i class="bi bi-arrow-left me-1"></i><span data-i18n="back_to_sessions">Back to voting sessions</span>
      </a>
    </div>

    <section id="publicVoteHero" class="card public-vote-panel mb-4 d-none">
      <div class="card-body p-4" id="publicVoteHeroContent"></div>
    </section>

    <div id="publicVoteLoading" class="card public-vote-panel">
      <div class="card-body text-center py-5">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden" data-i18n="loading">Loading...</span></div>
        <p class="text-body-secondary mt-3 mb-0" data-i18n="loading_session">Loading voting session...</p>
      </div>
    </div>

    <div id="publicVoteError" class="card public-vote-panel border border-danger d-none">
      <div class="card-body text-center py-5 px-3">
        <i class="bi bi-exclamation-circle text-danger" style="font-size:3rem"></i>
        <h1 class="h4 mt-3" id="publicVoteErrorText"></h1>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-4">
          <button type="button" class="btn btn-outline-danger" id="retryPublicVoteBtn" data-i18n="retry">Try again</button>
          <a class="btn btn-primary" href="index.html"><i class="bi bi-house me-1"></i><span data-i18n="back_home">Back to events</span></a>
        </div>
      </div>
    </div>

    <div id="publicVoteContent" class="d-none" aria-live="polite"></div>
  </main>

  <div class="modal fade" id="confirmPublicVoteModal" tabindex="-1" aria-labelledby="confirmPublicVoteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="confirmPublicVoteModalLabel" data-i18n="confirm_vote_title">Confirm your vote</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" data-i18n-aria-label="close" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="fs-5" id="confirmPublicVoteQuestion"></p>
          <div class="alert alert-warning mb-0"><i class="bi bi-info-circle me-2"></i><span data-i18n="vote_final_warning">Once submitted, your vote cannot be changed.</span></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmPublicVoteBtn"><i class="bi bi-check2-circle me-1"></i><span data-i18n="confirm_vote">Confirm vote</span></button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/public-vote.js"></script>
</body>
</html>
